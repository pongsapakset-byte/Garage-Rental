{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRIPATUM GARAGE | Luxury Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #FF2D78;
            --dark-bg: #050505;
        }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* โลโก้ซ้ายบน */
        .top-logo {
            position: absolute;
            top: 25px;
            left: 30px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
        }
        .top-logo img {
            width: 50px;
            height: auto;
            margin-right: 15px;
        }
        .top-logo span {
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        /* ตัวเนื้อหาตรงกลาง */
        .hero-section {
            text-align: center;
            z-index: 2;
        }
        .hero-section h1 {
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1;
        }
        .hero-section h1 span {
            color: var(--primary-pink);
        }
        .hero-section p {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* ปุ่มชมพู */
        .btn-main {
            background: var(--primary-pink);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border: 2px solid var(--primary-pink);
        }
        .btn-main:hover {
            background: transparent;
            color: var(--primary-pink);
            box-shadow: 0 0 30px rgba(255, 45, 120, 0.4);
        }

        /* พื้นหลังเท่ๆ */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 45, 120, 0.1) 0%, transparent 70%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <a href="/" class="top-logo">
        <img src="{% static 'images/logo-spu.png' %}" alt="SPU LOGO">
        <span>SRIPATUM<span style="color:var(--primary-pink)">GARAGE</span></span>
    </a>

    <div class="hero-section">
        <p>Welcome to the Elite</p>
        <h1>DRIVE YOUR <span>DREAM</span></h1>
        <div class="mt-5">
            <a href="/cars" class="btn-main">Explore Collection</a>
        </div>
    </div>

</body>
</html>
</html>
